{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="card">
    <h1>Student Registration Form</h1>
    <p class="subtitle">Fill in the details below to complete registration.</p>

    <form action="{{ url_for('register') }}" method="post" novalidate>
        <label>
            Full Name
            <input type="text" name="name" value="{{ form_data.get('name', '') }}">
            {% if errors.get('name') %}<span class="error">{{ errors.get('name') }}</span>{% endif %}
        </label>

        <label>
            Email Address
            <input type="email" name="email" value="{{ form_data.get('email', '') }}">
            {% if errors.get('email') %}<span class="error">{{ errors.get('email') }}</span>{% endif %}
        </label>

        <label>
            Phone Number
            <input type="text" name="phone" value="{{ form_data.get('phone', '') }}">
            {% if errors.get('phone') %}<span class="error">{{ errors.get('phone') }}</span>{% endif %}
        </label>

        <label>
            Course
            <select name="course">
                <option value="">Select Course</option>
                <option value="Python" {% if form_data.get('course') == 'Python' %}selected{% endif %}>Python</option>
                <option value="Flask" {% if form_data.get('course') == 'Flask' %}selected{% endif %}>Flask</option>
                <option value="Django" {% if form_data.get('course') == 'Django' %}selected{% endif %}>Django</option>
            </select>
            {% if errors.get('course') %}<span class="error">{{ errors.get('course') }}</span>{% endif %}
        </label>

        <label>
            Password
            <input type="password" name="password">
            {% if errors.get('password') %}<span class="error">{{ errors.get('password') }}</span>{% endif %}
        </label>

        <label>
            Confirm Password
            <input type="password" name="confirm_password">
            {% if errors.get('confirm_password') %}<span class="error">{{ errors.get('confirm_password') }}</span>{% endif %}
        </label>

        <button type="submit">Register</button>
    </form>
</section>
{% endblock %}
